name: lite

# Thin "is it sane?" gate. See CLAUDE.md §15.
# Heavy things (bundle, codesign, notarize) live in the release workflow, not here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # TS side — fast, runs on every push. Ubuntu because we don't
  # need a mac for lint/typecheck and Ubuntu runners are cheap.
  # ──────────────────────────────────────────────────────────────
  lint-ts:
    name: lint + typecheck (ts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - name: eslint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

  # ──────────────────────────────────────────────────────────────
  # Rust side — macOS arm64 because our target is Mac-native and
  # Tauri 2 pulls in macOS-specific system deps (webkit2gtk is only
  # for Linux; on macOS we use WKWebView). Running on ubuntu would
  # be faster but misleading.
  # ──────────────────────────────────────────────────────────────
  lint-rust:
    name: fmt + clippy (rust)
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  check-rust:
    name: cargo check (rust)
    runs-on: macos-14
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo check
        run: cargo check --locked --all-targets
