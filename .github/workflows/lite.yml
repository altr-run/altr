name: lite

# On-demand only. No auto-runs on push/PR.
# Trigger via: Actions tab -> "lite" -> "Run workflow"
# Or via gh CLI: gh workflow run lite.yml

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Which job(s) to run"
        type: choice
        default: "all"
        options:
          - all
          - lint-landing
          - lint-ts
          - lint-rust
          - check-rust

concurrency:
  group: lite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ts:
    if: ${{ inputs.job == 'all' || inputs.job == 'lint-ts' }}
    name: lint + typecheck (ts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  lint-landing:
    if: ${{ inputs.job == 'all' || inputs.job == 'lint-landing' }}
    name: typegen + lint + typecheck (landing)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: wyr088n5
      NEXT_PUBLIC_SANITY_DATASET: production
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bun run landing:typegen
      - run: bun run --filter=@altr/landing lint
      - run: bun run --filter=@altr/landing typecheck

  lint-rust:
    if: ${{ inputs.job == 'all' || inputs.job == 'lint-rust' }}
    name: fmt + clippy (rust)
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  check-rust:
    if: ${{ inputs.job == 'all' || inputs.job == 'check-rust' }}
    name: cargo check (rust)
    runs-on: macos-14
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: cargo check --locked --all-targets
